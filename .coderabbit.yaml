language: "en-US"

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  # Ignore generated or vendored content in reviews.
  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!package-lock.json"
  auto_review:
    enabled: true
    drafts: false

chat:
  auto_reply: true
